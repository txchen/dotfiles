#
# to refresh settings, run tmux source-file ~/.tmux.conf
#

# terminal settings
if-shell 'infocmp -x tmux-256color >/dev/null 2>&1' \
  'set -g default-terminal "tmux-256color"' \
  'set -g default-terminal "xterm-256color"'
set -as terminal-features ",xterm-256color:RGB,screen-256color:RGB,tmux-256color:RGB"
# Let TUI apps (for example yazi image preview) pass terminal escapes through tmux.
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# style
gray_light="#D8DEE9"
gray_medium="#ABB2BF"
gray_dark="#3B4252"
green_soft="#A3BE8C"
blue_muted="#81A1C1"
cyan_soft="#88C0D0"

set -g status-position top
set -g status-left-length 100
set -g status-style "fg=${gray_light},bg=${gray_dark}"
set -g status-left "#[fg=${green_soft},bold] #h:#S #[fg=${gray_light},nobold]| "
set -g window-status-current-format "#[fg=${cyan_soft},bold]▶ #[underscore]#I:#W"
set -g window-status-format ' #{?window_activity_flag,!,}#I:#W'
set -g window-status-activity-style "default"
set -g message-style "fg=${gray_light},bg=default"
set -g mode-style "fg=${gray_dark},bg=${blue_muted}"
set -g pane-border-style "fg=#4C566A"
set -g pane-active-border-style "fg=#EBCB8B"
set -g pane-border-status off
set -g pane-border-format '#{?pane_active,▶ , }#P'
set -g pane-border-lines heavy
# show pane title bar only when there are multiple panes in the window
set-hook -g window-layout-changed 'if-shell -F "#{==:#{window_panes},1}" "set -w pane-border-status off" "set -w pane-border-status top"'
set-hook -g after-new-window 'if-shell -F "#{==:#{window_panes},1}" "set -w pane-border-status off" "set -w pane-border-status top"'

# enable bash/zsh hotkey in tmux
set-window-option -g xterm-keys on

# make esc fast but slightly safer for key-sequence parsing
set -s escape-time 10

# increase the history limit
set-option -g history-limit 50000

# Smart pane switching for Neovim only (M-j/M-k).
# In Vim, fall back to normal tmux pane cycling.
bind -n M-j if-shell -F '#{==:nvim,#{pane_current_command}}' 'send-keys C-j' 'select-pane -t :.+'
bind -n M-k if-shell -F '#{==:nvim,#{pane_current_command}}' 'send-keys C-k' 'select-pane -t :.-'
bind -T copy-mode-vi M-j select-pane -D
bind -T copy-mode-vi M-k select-pane -U

# Alt + z to zoom (default is ctrl-b z)
bind -n M-z resize-pane -Z

# Alt + o to rotate (default is ctrl-b r)
bind -n M-o rotate-window -U

# Use | and - to split pane, easier to memorize
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# alt + h/l to switch window (alt+h/l is not 'that' useful in readline)
bind -n M-h previous-window
bind -n M-l next-window

# ctrl+b ctrl+k to enter:copy-mode
bind C-k copy-mode

# Activity Monitoring
setw -g monitor-activity on
set -g visual-activity off

# turn on all mouse features
set -g mouse on

# set vi mode in copy mode (ctrl+b [)
set-window-option -g mode-keys vi

# v and y like vi in copy-mode
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel

# in copy mode, ctrl-a ctrl-e to go to start/end of line
bind-key -T copy-mode-vi C-a send -X start-of-line
bind-key -T copy-mode-vi C-e send -X end-of-line

# ctrl+b ctrl+p (not ctrl+b p) to paste from tmux buffer
bind C-p paste-buffer

# popup tools
# ctrl+b g: open lazygit popup in current pane path
bind g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lazygit"
# ctrl+b y: open yazi in a full-screen-like pane.
# Popup mode can trigger terminal-response timeout/crash with some terminal/yazi combos.
bind y split-window -f -c "#{pane_current_path}" "yazi" \; resize-pane -Z

# not allow tmux auto set window name
set-option -g allow-rename off

# let tmux drive terminal tab title while inside tmux
set -g set-titles on
set -g set-titles-string "#T"

# set first window and pane to index 1 (not 0)
set -g base-index 1
set -g pane-base-index 1
# automatically renumber windows when one is closed
set -g renumber-windows on

# use zsh by default (to work around when chsh cannot work)
#set-option -g default-shell /bin/zsh

set -g @plugin 'tmux-plugin/tpm'

# plugins
# persist tmux sessins (ctrl-b ctrl-s to save, ctrl-b ctrl-r to reload)
set -g @plugin 'tmux-plugins/tmux-resurrect'
# auto save session every 15 minutes
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# init tpm
run '~/.tmux/plugins/tpm/tpm'
